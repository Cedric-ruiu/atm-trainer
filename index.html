      <div style="max-width:720px;margin:2rem auto;padding:1.5rem;font-family:system-ui,sans-serif;color:#1e293b;">
        <p style="font-size:1.5rem;font-weight:700;margin:0 0 .75rem;">DAB Trainer — Simulateur de distributeur automatique de billets</p>
        <p><strong>DAB Trainer</strong> est un simulateur de distributeur automatique de billets gratuit et open source, conçu pour aider les personnes en situation de handicap cognitif à s'entraîner au retrait d'argent en autonomie.</p>
        <p>L'application reproduit fidèlement les étapes d'un retrait : insertion de la carte, saisie du code PIN, récupération des billets et du reçu. Elle s'adresse aux professionnels du médico-social (ESAT, IME, SAVS, éducateurs spécialisés) ainsi qu'aux familles accompagnant un proche.</p>
        <p>Cette application nécessite JavaScript pour fonctionner. Veuillez l'activer dans votre navigateur.</p>
        <p>Code source et documentation : <a href="https://github.com/Cedric-ruiu/atm-trainer">github.com/Cedric-ruiu/atm-trainer</a></p>
        <hr />
        <h2>English</h2>
        <p><strong>DAB Trainer</strong> is a free and open-source ATM simulator designed to help people with cognitive disabilities practice withdrawing cash autonomously. Built for medico-social professionals and families.</p>
      </div>
