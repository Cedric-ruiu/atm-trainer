<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Page introuvable — DAB Trainer</title>
    <link rel="icon" type="image/svg+xml" href="/atm-trainer/favicon.svg" />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, sans-serif;
        color: #fff;
        background: linear-gradient(160deg, #2457a0 0%, #1a3878 50%, #152e60 100%);
        padding: 1.5rem;
      }
      main {
        max-width: 28rem;
        text-align: center;
      }
      .code {
        font-family: ui-monospace, monospace;
        font-size: 3.5rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #f0c040;
      }
      h1 {
        margin: 0.5rem 0 0;
        font-size: 1.25rem;
        font-weight: 700;
      }
      p {
        margin: 0.75rem 0 1.5rem;
        font-size: 0.9rem;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.7);
      }
      .en {
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.45);
      }
      a {
        display: inline-block;
        padding: 0.6rem 1.2rem;
        border-radius: 0.5rem;
        font-size: 0.9rem;
        font-weight: 700;
        text-decoration: none;
        color: #fff;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        transition: filter 0.15s;
      }
      a:hover {
        filter: brightness(1.2);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="code">404</div>
      <h1>Page introuvable</h1>
      <p>
        Cette page n'existe pas ou a été déplacée.<br />
        <span class="en">This page does not exist or has been moved.</span>
      </p>
      <a href="/atm-trainer/">Retour au simulateur — Back to the simulator</a>
    </main>
  </body>
</html>
